<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gmail Thread Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Google Sans", Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #3c4043;
      width: 380px;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 14px 16px 11px;
      border-bottom: 1px solid #e8eaed;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 500;
      color: #202124;
    }
    .header .count {
      font-size: 12px;
      color: #80868b;
    }
    .note-item {
      display: grid;
      grid-template-columns: 12px 1fr auto;
      align-items: start;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #f1f3f4;
    }
    .note-item:last-child { border-bottom: none; }
    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 1.5px solid;
      margin-top: 2px;
    }
    .note-text { overflow: hidden; }
    .subject {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #202124;
      margin-bottom: 2px;
      font-size: 13px;
    }
    .preview {
      color: #80868b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
    }
    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #80868b;
      font-size: 18px;
      line-height: 1;
      padding: 0 2px;
      border-radius: 4px;
      transition: color 0.1s, background 0.1s;
    }
    .delete-btn:hover { color: #c5221f; background: #fce8e6; }
    .empty {
      padding: 28px 16px;
      text-align: center;
      color: #80868b;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Gmail Thread Notes</h1>
    <span class="count" id="count"></span>
  </div>
  <div id="list"></div>
  <script src="popup.js"></script>
</body>
</html>
